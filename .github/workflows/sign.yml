name: Run Sign Scripts
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      sign:
        type: boolean
        description: 'sign'
        required: false

env:
  SIGN: ${{ inputs.sign }}
  
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    steps:
      - uses: actions/checkout@v2
        with:
          persist-credentials: true # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
          fetch-depth: 0 

      - name: Install Shell Depends
        run: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              curl \
              jq \
              ca-certificates \
              fonts-liberation \
              xvfb \
              xauth \
              xdg-utils 
      
      - name: Rclone Install
        run: |
            curl https://rclone.org/install.sh | sudo bash

      - name: Check depends
        run: |
            rclone -V
            python -V
      
      - name: Config Rclone
        run: |
          printf "$RCLONE_ENV_FILE" >> ~/.config/rclone/rclone.conf
        shell: bash
        env:
          RCLONE_ENV_FILE : ${{secrets.RCLONE_CONF}}
            
      - name: Install Python prerequisites
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          playwright install firefox --with-deps 
          playwright install chromium --with-deps

      - name: Get firefox playwright
        run: |
          FIREFOX_PATH=$(python -c "from playwright.sync_api import sync_playwright; p=sync_playwright().start(); print(p.firefox.executable_path); p.stop()")
          echo "FIREFOX_PATH=$FIREFOX_PATH" >> $GITHUB_ENV
          Xvfb :99 -screen 0 1920x1080x24 &

      - name: Copy to local
        run: |
          mkdir temp
          mkdir scripts
          FIRST_FILE=$(rclone lsjson scripts: | jq -r 'sort_by(.ModTime) | last | .Path')
          if [ -z "$FIRST_FILE" ]; then
              echo "没有找到文件"
              exit 1
          fi
          rclone copy "scripts:/$FIRST_FILE" "./temp" 
          unzip -o "temp/$FIRST_FILE" -d "./scripts"

      - name: Sign 215
        if: env.SIGN == 'true'
        continue-on-error: true
        run: |
          cd scripts/scripts
          python 215.py > /dev/null 2>&1
      
      - name: Sign voapi
        if: env.SIGN == 'true'
        continue-on-error: true
        run: |
          cd scripts/scripts
          python voapi.py > /dev/null 2>&1
      
      - name: Sign hohai
        if: env.SIGN == 'true'
        continue-on-error: true
        run: |
          cd scripts/scripts
          python hohai.py > /dev/null 2>&1
      
      - name: Sign hotmail
        continue-on-error: true
        run: |
          cd scripts/scripts/hotmail
          export DISPLAY=:99 && python register.py --firefox-path ${{env.FIREFOX_PATH}} > /dev/null 2>&1
      
      - name: Copy to Cloud
        run: |
          TIME=$(date +%Y%m%d_%H%M%S)
          ZIP_NAME="backup_${TIME}.zip"
          cd "scripts" && zip -r -q "../$ZIP_NAME" .
          cd ../
          rclone copy "$ZIP_NAME" scripts:/
          sleep 3s
          files_json=$(rclone lsjson scripts:)
          count=$(echo "$files_json" | jq 'length')
          if [ "$count" -gt 2 ]; then
            echo "$files_json" \
              | jq -r 'sort_by(.ModTime) | .[:-2] | .[].Path' \
              | while read -r f; do
                  rclone delete "scripts:$f"
                done
          fi
          #LAST_FILE= $(rclone lsjson scripts: | jq -r 'sort_by(.ModTime) | first | .Path')
          #rclone delete "scripts:/$LAST_FILE"
      
      - name: Delete workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run delruns.yml
      
          
