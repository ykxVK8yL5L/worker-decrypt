name: Playwright
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      Url:
        description: 'Headless'
        required: false
        default: 'false'

env:
  HEADLESS: false
  
jobs:
  build:
    runs-on: macos-latest
    if: github.event.repository.owner.id == github.event.sender.id
    steps:
      - uses: actions/checkout@v2
        with:
          persist-credentials: true # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
          fetch-depth: 0 

      - uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true
      
      - name: Rclone Install
        run: |
            curl https://rclone.org/install.sh | sudo bash

      - name: Check depends
        run: |
            rclone -V
            python -V
      
      - name: Config Rclone
        run: |
          printf "$RCLONE_ENV_FILE" >> ~/.config/rclone/rclone.conf
        shell: bash
        env:
          RCLONE_ENV_FILE : ${{secrets.RCLONE_CONF}}
            
      - name: Install Python prerequisites
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          playwright install firefox --with-deps 

      - name: Get firefox playwright
        run: |
          FIREFOX_PATH=$(python -c "from playwright.sync_api import sync_playwright; p=sync_playwright().start(); print(p.firefox.executable_path); p.stop()")
          echo "FIREFOX_PATH=$FIREFOX_PATH" >> $GITHUB_ENV
      
      - name: Copy to local
        run: |
          mkdir scripts
          FIRST_FILE=$(rclone lsf --files-only --max-depth 1 --format "pt" "scripts" | sort -r | head -n 1 | awk '{print $2}')
          if [ -z "$FIRST_FILE" ]; then
              echo "没有找到文件"
              exit 1
          fi
          echo "下载文件: $FIRST_FILE"
          rclone copy "scripts:/$FIRST_FILE" "scripts" --progress
          unzip -o "sciprts/$FIRST_FILE" -d "scripts"
          ls scripts

