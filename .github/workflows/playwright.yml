name: Playwright
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      Url:
        description: 'Headless'
        required: false
        default: 'false'

env:
  HEADLESS: false
  
jobs:
  build:
    runs-on: macos-latest
    if: github.event.repository.owner.id == github.event.sender.id
    steps:
      - uses: actions/checkout@v2
        with:
          persist-credentials: true # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
          fetch-depth: 0 

      - uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true

      - name: Check depends
        run: |
            python -V
            
      - name: Install prerequisites
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          playwright install firefox --with-deps 

      - name: Get firefox playwright
        run: |
          FIREFOX_PATH=$(python -c "from playwright.sync_api import sync_playwright; p=sync_playwright().start(); print(p.firefox.executable_path); p.stop()")
          echo "FIREFOX_PATH=$FIREFOX_PATH" >> $GITHUB_ENV

      - name: Run code
        run: |
            echo ${{ env.FIREFOX_PATH }}
            python sign.py --email="${{ secrets.IIOS_EMAIL }}" --password="${{ secrets.IIOS_PASSWORD }}"



          